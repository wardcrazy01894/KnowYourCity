name: ci

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege token. gitleaks-action needs to read PR commits on
# pull_request events; without this it 403s ("Resource not accessible by
# integration").
permissions:
  contents: read
  pull-requests: read

jobs:
  # -------------------------------------------------------------------------
  # Build, type-check, lint, format-check the web app.
  # -------------------------------------------------------------------------
  build:
    name: build / typecheck / lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies (locked)
        run: npm ci

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Build (vite)
        run: npm run build

  # -------------------------------------------------------------------------
  # Unit tests for the deterministic core (daily selection, scoring).
  # -------------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies (locked)
        run: npm ci

      - name: Run tests (vitest)
        run: npm test

  # -------------------------------------------------------------------------
  # Secret scan: catch accidentally committed credentials (e.g. a Mapbox token).
  # -------------------------------------------------------------------------
  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so gitleaks can scan all commits on the branch

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
