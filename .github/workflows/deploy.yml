name: deploy

# Auto-publish the site to GitHub Pages on every push to main (i.e. after a PR
# merges). Requires repo Settings → Pages → Source = "GitHub Actions".
#
# The site's PUBLIC client config is read from repo Variables (Settings →
# Secrets and variables → Actions → Variables) so it bakes into the bundle:
#   - VITE_BUG_ENDPOINT          the deployed bug-report worker URL (one-click issues)
#   - VITE_LEADERBOARD_ENDPOINT  the deployed leaderboard worker URL (daily standings)
#   - VITE_TURNSTILE_SITEKEY     public Turnstile site key for the bug form's bot check
#   - VITE_MAPBOX_TOKEN          optional, for Mapbox satellite tiles (Esri is default)
#   - VITE_CF_BEACON_TOKEN       optional, Cloudflare Web Analytics page-view beacon
# All of these are PUBLIC values (they ship in client JS), so Variables — not
# Secrets — is correct. If unset, the build still succeeds and the bug form
# falls back to opening a prefilled GitHub issue page.

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual re-deploys from the Actions tab

# Least-privilege; the deploy job needs pages:write + id-token:write.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies (locked)
        run: npm ci

      # Deploy gate (scan M7): merges to main are CI-gated by branch
      # protection, but a workflow_dispatch re-deploy isn't — without this, a
      # manual re-run could publish an untested tree. Cheap insurance.
      - name: Test gate (vitest + lint + format)
        run: |
          npm test
          npm run lint
          npm run format:check

      # enablement: true turns Pages ON automatically on the first run (source =
      # GitHub Actions), so no manual Settings → Pages toggle is needed. Runs
      # before the build so any Pages misconfig fails fast, not after a build.
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - name: Build (vite)
        run: npm run build
        env:
          VITE_BUG_ENDPOINT: ${{ vars.VITE_BUG_ENDPOINT }}
          VITE_LEADERBOARD_ENDPOINT: ${{ vars.VITE_LEADERBOARD_ENDPOINT }}
          VITE_TURNSTILE_SITEKEY: ${{ vars.VITE_TURNSTILE_SITEKEY }}
          VITE_MAPBOX_TOKEN: ${{ vars.VITE_MAPBOX_TOKEN }}
          VITE_CF_BEACON_TOKEN: ${{ vars.VITE_CF_BEACON_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
