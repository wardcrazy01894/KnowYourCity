<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Defense-in-depth: block injected/inline scripts (only self + Turnstile
         allowed) while staying permissive for map tiles + the bug worker. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://challenges.cloudflare.com https://static.cloudflareinsights.com; frame-src https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src * data: blob:; connect-src *; font-src 'self' data:"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Know Your City</title>
    <meta
      name="description"
      content="A daily map-guessing game for local landmarks — St. Pete, State College, Ann Arbor, Seattle, Chicago."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
